name: Release
on:
  push:
    tags:
      - 'v*' # 仅在推送 v开头的 tag 时触发打包 (例如 v1.0.0)
  workflow_dispatch: # 允许手动在页面触发

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # 定义需要构建的系统平台环境
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 针对 Linux 平台安装依赖
      - name: Install Rust system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Node)
        run: npm install

      # 使用 Tauri 官方的 Action 打包
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "v__VERSION__" # 自定义Release的标签名字
          releaseName: "RestReminder v__VERSION__"
          releaseBody: "这里是本次更新的说明..."
          releaseDraft: true     # 是否将打包后的Release标记为草稿方便你检查后再发布
          prerelease: false      # 是否标记为预发布版本
